<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f5132" />

    <title>Доставки Хубенов — Колети Великобритания ⇄ България</title>
    <meta
      name="description"
      content="Бързи и надеждни колетни пратки между Великобритания и България. Собствен транспорт, курс всеки петък от Манчестър. Достъп до врата и офис на Еконт."
    />

    <!-- Open Graph / social -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Доставки Хубенов" />
    <meta property="og:title" content="Доставки Хубенов — Колети Великобритания ⇄ България" />
    <meta
      property="og:description"
      content="Собствен транспорт UK→BG, курс всеки петък. Проследяване на пратки и моментална оферта."
    />
    <meta property="og:locale" content="bg_BG" />
    <meta property="og:locale:alternate" content="en_GB" />
    <meta property="og:url" content="https://hubenov.delivery/" />
    <meta property="og:image" content="https://hubenov.delivery/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Доставки Хубенов — Манчестър → България" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Доставки Хубенов — Колети Великобритания ⇄ България" />
    <meta name="twitter:description" content="Собствен транспорт UK→BG, курс всеки петък. Проследяване и моментална оферта." />
    <meta name="twitter:image" content="https://hubenov.delivery/og-image.jpg" />

    <!-- Structured data (schema.org). Static in the served HTML so crawlers and
         AI engines read the entity, service and pricing without executing JS.
         The FAQPage schema lives on /faq (rendered there). -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "LocalBusiness",
            "@id": "https://hubenov.delivery/#business",
            "name": "Доставки Хубенов",
            "alternateName": "Hubenov Delivery",
            "url": "https://hubenov.delivery/",
            "logo": "https://hubenov.delivery/apple-touch-icon.png",
            "image": "https://hubenov.delivery/og-image.jpg",
            "description": "Parcel and baggage delivery between the United Kingdom and Bulgaria. Own weekly van from Manchester; delivery to any Econt office across Bulgaria in 2-3 days. From £2/kg, £20 minimum.",
            "telephone": "+44 7895 909915",
            "email": "bogoslavvv@gmail.com",
            "priceRange": "££",
            "currenciesAccepted": "GBP",
            "paymentAccepted": "Bank transfer, Cash in office",
            "address": {
              "@type": "PostalAddress",
              "streetAddress": "542 Liverpool Road, Eccles",
              "addressLocality": "Manchester",
              "postalCode": "M30 7JA",
              "addressCountry": "GB"
            },
            "areaServed": [
              { "@type": "Country", "name": "United Kingdom" },
              { "@type": "Country", "name": "Bulgaria" }
            ],
            "sameAs": ["https://www.facebook.com/profile.php?id=61554729133249"],
            "makesOffer": [
              {
                "@type": "Offer",
                "priceCurrency": "GBP",
                "priceSpecification": {
                  "@type": "UnitPriceSpecification",
                  "price": "2.00",
                  "priceCurrency": "GBP",
                  "referenceQuantity": {
                    "@type": "QuantitativeValue",
                    "value": "1",
                    "unitCode": "KGM"
                  }
                },
                "itemOffered": {
                  "@type": "Service",
                  "name": "Parcel delivery from the UK to Bulgaria",
                  "description": "Weekly van from Manchester to Bulgaria, delivery to any Econt office. From £2/kg with a £20 minimum (covers up to 10 kg), typically 2-3 days.",
                  "serviceType": "Courier and parcel delivery"
                }
              },
              {
                "@type": "Offer",
                "priceCurrency": "GBP",
                "itemOffered": {
                  "@type": "Service",
                  "name": "Baggage delivery from Bulgaria to the UK",
                  "description": "Send via any Econt office to our Gotse Delchev drop-off (Panairski Livadi); collected every Tuesday, in Manchester by Friday the same week.",
                  "serviceType": "Courier and parcel delivery"
                }
              }
            ]
          },
          {
            "@type": "WebSite",
            "@id": "https://hubenov.delivery/#website",
            "url": "https://hubenov.delivery/",
            "name": "Доставки Хубенов",
            "alternateName": "Hubenov Delivery",
            "inLanguage": ["bg", "en"],
            "publisher": { "@id": "https://hubenov.delivery/#business" }
          }
        ]
      }
    </script>

    <!-- Preload the LCP hero (responsive: phones get the light 800px file) -->
    <link
      rel="preload"
      as="image"
      href="/images/hero-van.webp"
      imagesrcset="/images/hero-van-800.webp 800w, /images/hero-van.webp 1280w"
      imagesizes="100vw"
      fetchpriority="high"
    />

    <!-- Self-hosted Manrope (§9). Preload the two above-the-fold subsets
         (Cyrillic H1 + Latin brand/English) so the heading paints in the brand
         font immediately — no third-party round-trip, no late swap → stable CLS.
         @font-face + metric fallback live in src/index.css. -->
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="/fonts/manrope-cyrillic-wght-normal.woff2"
      crossorigin
    />
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="/fonts/manrope-latin-wght-normal.woff2"
      crossorigin
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
